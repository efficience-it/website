<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g opacity="0.06">
    <text x="60" y="90" font-family="monospace" font-size="13" fill="#38bdf8">$serializer->serialize($data, 'json');</text>
    <text x="60" y="120" font-family="monospace" font-size="13" fill="#38bdf8">// ~2200ms | ~480MB</text>
    <text x="60" y="170" font-family="monospace" font-size="13" fill="#4ade80">$stream = $streamer->write($data);</text>
    <text x="60" y="200" font-family="monospace" font-size="13" fill="#4ade80">foreach ($stream as $chunk) { echo $chunk; }</text>
    <text x="60" y="230" font-family="monospace" font-size="13" fill="#4ade80">// ~200ms | ~9MB</text>
    <text x="700" y="480" font-family="monospace" font-size="13" fill="#38bdf8">50 000 objets</text>
    <text x="700" y="510" font-family="monospace" font-size="13" fill="#4ade80">10x plus rapide</text>
    <text x="700" y="540" font-family="monospace" font-size="13" fill="#4ade80">98% moins de RAM</text>
  </g>
  <rect x="130" y="280" width="4" height="120" rx="2" fill="#4ade80" opacity="0.15"/>
  <circle cx="1000" cy="180" r="100" fill="#38bdf8" opacity="0.04"/>
  <circle cx="180" cy="480" r="70" fill="#4ade80" opacity="0.04"/>
  <text x="600" y="240" text-anchor="middle" font-family="system-ui,sans-serif" font-size="22" font-weight="600" fill="#94a3b8" letter-spacing="4">SERIALIZER vs JSONSTREAMER</text>
  <text x="600" y="310" text-anchor="middle" font-family="system-ui,sans-serif" font-size="48" font-weight="800" fill="#f8fafc">Migrer vers</text>
  <text x="600" y="375" text-anchor="middle" font-family="system-ui,sans-serif" font-size="48" font-weight="800" fill="#4ade80">JsonStreamer</text>
  <rect x="440" y="405" width="320" height="3" rx="1.5" fill="#4ade80" opacity="0.5"/>
  <text x="600" y="450" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#64748b">Le guide honnete pour Symfony 7.3+</text>
  <text x="600" y="570" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" fill="#475569" letter-spacing="2">EFFICIENCE IT</text>
</svg>
